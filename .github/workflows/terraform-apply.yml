name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - prod
      auto_approve:
        description: "Skip interactive approval"
        required: true
        type: boolean
        default: false

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init (Remote Backend)
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=nutritrack/${{ inputs.environment }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file=environments/${{ inputs.environment }}.tfvars \
            -var="usda_api_key=${{ secrets.USDA_API_KEY }}" \
            -var="avocavo_api_key=${{ secrets.AVOCAVO_API_KEY }}" \
            -out=tfplan-${{ inputs.environment }}

      - name: Terraform Apply (Auto Approve)
        if: ${{ inputs.auto_approve }}
        run: terraform apply -input=false -auto-approve tfplan-${{ inputs.environment }}

      - name: Terraform Apply (Manual Confirm)
        if: ${{ !inputs.auto_approve }}
        run: terraform apply -input=false tfplan-${{ inputs.environment }}

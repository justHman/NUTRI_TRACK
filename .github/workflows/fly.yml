name: Test and Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run Pytest (non-integration)
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          AVOCAVO_NUTRITION_API_KEY: ${{ secrets.AVOCAVO_NUTRITION_API_KEY }}
        run: |
          pytest -m "not integration" tests -v

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    env:
      APP_NAME: nutritrack-api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only 
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Start VM for cache upload
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          MACHINE_ID=$(flyctl machine list -a "$APP_NAME" -q | head -n 1)
          if [ -z "$MACHINE_ID" ]; then
            echo "No machine found for app $APP_NAME"
            exit 1
          fi
          echo "Using machine: $MACHINE_ID"
          flyctl machine start "$MACHINE_ID" -a "$APP_NAME" || true
          echo "MACHINE_ID=$MACHINE_ID" >> "$GITHUB_ENV"
          sleep 15

      - name: Upload cache files to Fly volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh sftp put data/usda_cache.json /app/data/usda_cache.json -a "$APP_NAME" --machine "$MACHINE_ID"
          flyctl ssh sftp put data/avocavo_cache.json /app/data/avocavo_cache.json -a "$APP_NAME" --machine "$MACHINE_ID"
          flyctl ssh sftp put data/openfoodfacts_cache.json /app/data/openfoodfacts_cache.json -a "$APP_NAME" --machine "$MACHINE_ID"

      - name: Verify uploaded cache files
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console -a "$APP_NAME" --machine "$MACHINE_ID" -C "ls -lh /app/data/*.json"

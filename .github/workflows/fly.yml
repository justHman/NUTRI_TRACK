name: Test and Deploy to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r requirements.txt

      - name: Run Pytest 
        id: run-pytest
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          AVOCAVO_NUTRITION_API_KEY: ${{ secrets.AVOCAVO_NUTRITION_API_KEY }}
        run: pytest tests
        continue-on-error: true

      - name: Warn if tests failed
        if: steps.run-pytest.outcome == 'failure'
        run: |
          echo "::warning::Pytest reported failures, but pipeline is configured to continue with build and deploy."

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: test
    env:
      APP_NAME: nutritrack-api
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only 
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wake app before cache upload
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS "https://$APP_NAME.fly.dev/health" > /dev/null; then
              echo "App is awake attempt $i/5."
              break
            fi
            echo "Waiting for app to start... attempt $i/5"
            sleep 8
          done

      - name: Upload cache files to Fly volume
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          mkdir -p .cache-sync/remote

          # Best effort: download existing remote caches for two-way merge.
          fetch_remote() {
            local name="$1"
            local remote="/app/data/$name"
            local local_path=".cache-sync/remote/$name"
            if flyctl ssh console -a "$APP_NAME" -C "test -f '$remote'" >/dev/null 2>&1; then
              if flyctl ssh sftp get "$remote" "$local_path" -a "$APP_NAME"; then
                echo "Downloaded remote cache: $remote"
              else
                echo "::warning::Failed to download remote cache $remote. Using local seed only."
              fi
            else
              echo "::warning::Remote cache not found yet for $remote. Using local seed only."
            fi
          }

          fetch_remote usda_cache.json
          fetch_remote avocavo_cache.json
          fetch_remote openfoodfacts_cache.json

          python <<'PY'
          import json
          from pathlib import Path
          from typing import Any, Dict


          def load_cache(path: Path) -> Dict[str, Any]:
              if not path.exists():
                  return {"foods": {}, "barcodes": {}}
              try:
                  with path.open("r", encoding="utf-8") as f:
                      data = json.load(f)
                  if not isinstance(data, dict):
                      return {"foods": {}, "barcodes": {}}
                  data.setdefault("foods", {})
                  data.setdefault("barcodes", {})
                  return data
              except Exception:
                  return {"foods": {}, "barcodes": {}}


          def get_ts(entry: Any) -> float:
              if isinstance(entry, dict):
                  ts = entry.get("_ts", 0)
                  try:
                      return float(ts)
                  except Exception:
                      return 0.0
              return 0.0


          def merge_bucket(remote_bucket: Dict[str, Any], local_bucket: Dict[str, Any]) -> Dict[str, Any]:
              merged: Dict[str, Any] = {}
              keys = set(remote_bucket.keys()) | set(local_bucket.keys())
              for key in keys:
                  has_remote = key in remote_bucket
                  has_local = key in local_bucket
                  if has_remote and not has_local:
                      merged[key] = remote_bucket[key]
                  elif has_local and not has_remote:
                      merged[key] = local_bucket[key]
                  else:
                      r_val = remote_bucket[key]
                      l_val = local_bucket[key]
                      # Keep the fresher entry; tie goes to remote to preserve server state.
                      merged[key] = r_val if get_ts(r_val) >= get_ts(l_val) else l_val
              return merged


          def merge_cache(remote: Dict[str, Any], local: Dict[str, Any]) -> Dict[str, Any]:
              merged = dict(remote)
              merged["foods"] = merge_bucket(remote.get("foods", {}), local.get("foods", {}))
              merged["barcodes"] = merge_bucket(remote.get("barcodes", {}), local.get("barcodes", {}))
              return merged


          cache_names = [
              "usda_cache.json",
              "avocavo_cache.json",
              "openfoodfacts_cache.json",
          ]

          for name in cache_names:
              local_path = Path("data") / name
              remote_path = Path(".cache-sync/remote") / name
              local_cache = load_cache(local_path)
              remote_cache = load_cache(remote_path)
              merged_cache = merge_cache(remote_cache, local_cache)
              local_path.parent.mkdir(parents=True, exist_ok=True)
              with local_path.open("w", encoding="utf-8") as f:
                  json.dump(merged_cache, f, ensure_ascii=False, indent=2)
              foods_count = len(merged_cache.get("foods", {}))
              barcodes_count = len(merged_cache.get("barcodes", {}))
              print(f"Merged {name}: foods={foods_count}, barcodes={barcodes_count}")
          PY

          upload_with_retry() {
            local src="$1"
            local dst="$2"
            local dst_new
            dst_new="${dst%.json}_new.json"
            for i in 1 2 3 4 5; do
              if flyctl ssh sftp put "$src" "$dst_new" -a "$APP_NAME"; then
                if flyctl ssh console -a "$APP_NAME" -C "mv -f '$dst_new' '$dst'"; then
                  echo "Uploaded $dst_new and replaced $dst"
                  return 0
                fi
              fi
              echo "Upload failed for $src. Retry $i/5..."
              flyctl ssh console -a "$APP_NAME" -C "rm -f '$dst_new'" >/dev/null 2>&1 || true
              sleep 8
            done
            echo "Failed to upload $src after retries"
            return 1
          }

          upload_with_retry data/usda_cache.json /app/data/usda_cache.json
          upload_with_retry data/avocavo_cache.json /app/data/avocavo_cache.json
          upload_with_retry data/openfoodfacts_cache.json /app/data/openfoodfacts_cache.json

      - name: Verify uploaded cache files
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console -a "$APP_NAME" -C "sh -c 'ls /app/data/*.json'" 

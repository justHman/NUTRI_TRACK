name: 🚀 Deploy NutriTrack API → AWS ECS

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "infra/terraform/**"
      - ".github/workflows/terraform-plan.yml"
      - ".github/workflows/terraform-apply.yml"

  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "arm-spot"
        type: choice
        options:
          - arm
          - arm-spot
          - both

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.10.11"

  ECS_CLUSTER: nutritrack-api-cluster
  CONTAINER_NAME: arm-nutritrack-api-container 
  
  ECS_TASK_ARM: arm-nutritrack-api-task

  ECS_SERVICE_ARM: arm-nutritrack-api-service
  ECS_SERVICE_ARM_SPOT: arm-spot-nutritrack-api-service

  IMAGE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/nutritrack-api

# ============================================================
# BUILD IMAGE
# ============================================================

jobs:

  test:
    name: "🧪 Test (pytest)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        id: run-pytest
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
          AVOCAVO_NUTRITION_API_KEY: ${{ secrets.AVOCAVO_NUTRITION_API_KEY }}
        run: pytest tests
        continue-on-error: true

      - name: Warn if tests failed
        if: steps.run-pytest.outcome == 'failure'
        run: |
          echo "::warning::Pytest reported failures, but pipeline is configured to continue with build and deploy."

  build:
    name: 🔨 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Validate DockerHub token scopes
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
        run: |
          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -u "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${IMAGE_REPO}:pull,push")

          if [ "$STATUS_CODE" != "200" ]; then
            echo "::error::Docker Hub token validation failed (HTTP ${STATUS_CODE})."
            echo "::error::Ensure DOCKERHUB_TOKEN has Read + Write scopes and can access repository ${IMAGE_REPO}."
            echo "::error::Ensure DOCKERHUB_USERNAME is the Docker Hub ID that owns (or is granted access to) ${IMAGE_REPO}."
            exit 1
          fi

      # 🚀 build cache giúp build nhanh hơn ~3x
      - name: Build & Push ARM64 Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true

          cache-from: type=gha
          cache-to: type=gha,mode=max

          tags: |
            ${{ env.IMAGE_REPO }}:arm
            ${{ env.IMAGE_REPO }}:arm-${{ github.sha }}

      - name: Export image tag
        id: meta
        run: |
          echo "image=${{ env.IMAGE_REPO }}:arm-${{ github.sha }}" >> $GITHUB_OUTPUT


# ============================================================
# DEPLOY ARM SPOT (PRIMARY)
# ============================================================

  deploy-arm-spot:
    name: 🚀 Deploy → ECS ARM Spot
    runs-on: ubuntu-latest
    needs: build

    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'arm-spot') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'both')

    outputs:
      task_revision: ${{ steps.deploy.outputs.task-definition }}

    steps:

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_ARM }} \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy service
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_ARM_SPOT }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true


# ============================================================
# DEPLOY ARM (SECONDARY / BACKUP)
# ============================================================

  deploy-arm:
    name: 🚀 Deploy → ECS ARM
    runs-on: ubuntu-latest
    needs: [build, deploy-arm-spot]

    if: |
      (github.event_name == 'workflow_dispatch' && inputs.target == 'arm') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'both')

    steps:

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_ARM }} \
            --query taskDefinition \
            > task-definition.json

      - name: Inject new image
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build.outputs.image }}

      - name: Deploy service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_ARM }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
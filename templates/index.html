<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack — Phân tích dinh dưỡng</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="lang-switcher">
        <button id="langToggle" onclick="toggleLanguage()">🇬🇧 EN</button>
    </div>
    <div class="container">
        <header>
            <h1>🍽️ NutriTrack</h1>
            <p data-i18n="header_desc">Chụp hoặc upload ảnh đồ ăn — AI phân tích dinh dưỡng chi tiết</p>
        </header>

        <!-- Upload Zone -->
        <div class="upload-zone" id="dropZone">
            <div class="icon">📷</div>
            <div class="label" data-i18n="upload_label">Kéo thả ảnh vào đây hoặc chọn bên dưới</div>
            <div class="sublabel" data-i18n="upload_sub">Hỗ trợ JPG, PNG, WebP</div>
        </div>

        <!-- Action Buttons -->
        <div class="upload-actions">
            <button class="btn btn-primary" onclick="fileInput.click()">
                <span data-i18n="btn_choose">📁 Chọn ảnh</span>
            </button>
            <button class="btn btn-secondary" onclick="cameraInput.click()">
                <span data-i18n="btn_capture">📸 Chụp ảnh</span>
            </button>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" id="fileInput" accept="image/*">
        <input type="file" id="cameraInput" accept="image/*" capture="environment">

        <!-- Image Preview -->
        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="Preview">
            <div class="filename" id="fileName"></div>
            <div style="margin-top: 12px;">
                <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeImage()">
                    <span data-i18n="btn_analyze">🔍 Phân tích dinh dưỡng</span>
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p data-i18n="loading_text">🤖 AI đang phân tích ảnh...</p>
            <p style="font-size: 12px; color: #475569; margin-top: 4px;" data-i18n="loading_sub">Quá trình này có thể
                mất 10-30 giây</p>
        </div>

        <!-- Error -->
        <div class="error" id="error"></div>

        <!-- Results -->
        <div class="results" id="results"></div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
